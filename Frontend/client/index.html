<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Kavindu Kumanayaka - Software Developer | Portfolio</title>
  <meta name="description"
    content="Kavindu Kumanayaka is a motivated Information Technology undergraduate at SLIATE Galle, showcasing web development projects including Restaurant DBMS, Student Management System, and Tourism Website. Available for internship opportunities." />
  <link rel="icon" type="image/jpg" href="/profile.jpg" />

  <!-- Open Graph -->
  <meta property="og:title" content="Kavindu Kumanayaka - Software Developer Portfolio" />
  <meta property="og:description"
    content="IT undergraduate specializing in web development with expertise in HTML, CSS, JavaScript, PHP, MySQL, and Flutter. View my projects and connect for opportunities." />
  <meta property="og:image" content="/profile.jpg" />
  <meta property="og:type" content="website" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet" />

  <style>
    #preloader {
      position: fixed;
      inset: 0;
      background: #0a1221;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s;
    }

    .loader-content {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .loader-image {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #38bdf8;
      padding: 4px;
      z-index: 2;
    }

    .loader-ring {
      position: absolute;
      inset: -8px;
      border: 2px solid transparent;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
    }

    .loader-ring::after {
      content: "";
      position: absolute;
      inset: 4px;
      border: 2px solid transparent;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 2.5s linear infinite reverse;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #preloader.fade-out {
      opacity: 0;
      visibility: hidden;
    }
  </style>
</head>

<body>
  <div id="preloader">
    <div class="loader-content">
      <div class="loader-ring"></div>
      <img src="/profile.jpg" alt="Loading..." class="loader-image" />
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    window.addEventListener('load', () => {
      const preloader = document.getElementById('preloader');
      setTimeout(() => {
        preloader.classList.add('fade-out');
      }, 800);
    });
  </script>
</body>

</html>
